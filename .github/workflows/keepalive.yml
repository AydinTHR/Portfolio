name: Keep API warm

# Render's free tier sleeps after 15 minutes of inactivity, which makes the
# first visit slow (the site waits on the API before rendering). A lightweight
# scheduled ping keeps the instance awake so that wait stays short.
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API health endpoint
        run: curl -fsS -m 30 https://api.aydintehrani.com/api/health || true
